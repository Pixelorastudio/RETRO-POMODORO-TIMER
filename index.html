<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RETRO POMODORO TIMER ★</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d0a14">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        :root {
            --lavender:  #c084fc;
            --peach:     #fb923c;
            --mint:      #6ee7b7;
            --blush:     #f9a8d4;
            --cream:     #fef9c3;
            --sky:       #7dd3fc;
            --bg:        #0d0a14;
            --surface:   #160f24;
            --surface2:  #1e1530;
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            background: var(--bg);
            color: var(--mint);
            font-family: 'VT323', monospace;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            image-rendering: pixelated;
            padding: 20px;
            position: relative;
        }

        /* ── PAGE STARFIELD ── */
        #page-stars {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .pstar {
            position: absolute;
            border-radius: 0; /* pixel stars = square */
            animation: ptwinkle var(--dur) ease-in-out infinite var(--delay);
        }

        @keyframes ptwinkle {
            0%,100% { opacity: var(--dim); transform: scale(1); }
            50%      { opacity: var(--bright); transform: scale(1.6); }
        }

        /* ── REST OF STYLES (unchanged) ── */
        .crt-frame {
            width: 100%;
            max-width: 900px;
            background: #1a1228;
            border: 16px solid #221938;
            border-top-color: #2e2250;
            border-radius: 10px;
            box-shadow:
                0 0 0 10px #0d0a14,
                0 30px 60px rgba(0,0,0,0.9),
                inset 0 0 80px rgba(192,132,252,0.08);
            position: relative;
            z-index: 1;
            overflow: hidden;
        }

        .crt-screen {
            background: var(--surface);
            padding: 28px 32px;
            position: relative;
            border: 4px solid #2a1e3e;
        }

        .crt-screen::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: repeating-linear-gradient(
                transparent 0px, transparent 2px,
                rgba(192,132,252,0.05) 2px, rgba(192,132,252,0.05) 4px
            );
            pointer-events: none;
            z-index: 3;
            animation: scan 8s linear infinite;
        }

        @keyframes scan {
            0%   { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        .stars {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .star {
            position: absolute;
            width: 3px; height: 3px;
            opacity: 0.25;
            animation: twinkle 3s ease-in-out infinite;
        }
        @keyframes twinkle {
            0%,100% { opacity: 0.1; }
            50%      { opacity: 0.45; }
        }

        .layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0 28px;
            align-items: start;
            position: relative;
            z-index: 1;
        }

        .col-left  { grid-column: 1; display: flex; flex-direction: column; }
        .col-right { grid-column: 2; display: flex; flex-direction: column; gap: 16px; }

        .header-full { grid-column: 1 / -1; text-align: center; margin-bottom: 22px; }
        .footer-full  { grid-column: 1 / -1; text-align: center; font-size: 0.75rem; color: #6b5a8a; margin-top: 14px; }

        .title {
            font-family: 'Press Start 2P', cursive;
            font-size: 1.8rem;
            color: var(--blush);
            text-shadow: 0 0 8px #f9a8d4, 0 0 22px #c084fc88;
            letter-spacing: 4px;
        }

        .subtitle { font-size: 0.9rem; color: var(--lavender); opacity: 0.7; margin-top: 4px; }

        .tomato-icon {
            display: inline-block;
            font-size: 1.1rem;
            margin: 0 6px;
            vertical-align: middle;
            animation: bob 2s ease-in-out infinite;
        }
        @keyframes bob {
            0%,100% { transform: translateY(0); }
            50%      { transform: translateY(-3px); }
        }

        .display {
            background: #0a0715;
            border: 4px solid #3b2d5e;
            border-bottom-color: #5b3f8e;
            padding: 20px;
            text-align: center;
            margin-bottom: 18px;
            position: relative;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.8);
        }

        .display::before, .display::after {
            content: '✦';
            position: absolute;
            font-size: 0.6rem;
            color: var(--lavender);
            opacity: 0.5;
        }
        .display::before { top: 6px; left: 8px; }
        .display::after  { top: 6px; right: 8px; }

        #timer {
            font-family: 'VT323', monospace;
            font-size: 5.2rem;
            color: var(--cream);
            text-shadow: 0 0 12px #fef9c3aa, 0 0 28px #fbbf2466;
            letter-spacing: 8px;
            line-height: 1;
        }

        #mode {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.95rem;
            margin-top: 12px;
            color: var(--blush);
            text-shadow: 0 0 10px #f9a8d4aa;
            min-height: 30px;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }

        button {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.85rem;
            padding: 12px 20px;
            background: var(--surface2);
            color: var(--mint);
            border: 3px solid #3b4d6e;
            cursor: pointer;
            transition: all 0.1s;
            text-transform: uppercase;
            box-shadow: 0 0 0 3px #0d0a14;
        }
        button:hover  { background: var(--mint); color: var(--bg); border-color: var(--mint); }
        button:active { transform: translate(2px,2px); box-shadow: 0 0 0 1px #0d0a14; }

        #startBtn { color: var(--lavender); border-color: var(--lavender); }
        #startBtn:hover { background: var(--lavender); color: var(--bg); }
        #pauseBtn { color: var(--peach); border-color: var(--peach); }
        #pauseBtn:hover { background: var(--peach); color: var(--bg); }

        .settings { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        .control-group { background: var(--surface2); padding: 12px; border: 2px solid #2e2250; }

        label { display: block; font-size: 0.8rem; margin-bottom: 6px; color: #9d7ec9; letter-spacing: 1px; }

        input[type="number"] {
            width: 100%;
            background: #0a0715;
            border: 2px solid #3b2d5e;
            color: var(--cream);
            font-family: 'VT323', monospace;
            font-size: 1.6rem;
            padding: 8px;
            text-align: center;
        }

        .music-panel {
            background: var(--surface2);
            border: 3px solid #5b3f8e;
            padding: 14px;
            position: relative;
        }
        .music-panel::before {
            content: '♪';
            position: absolute;
            top: -1px; right: 10px;
            font-size: 0.9rem;
            color: var(--lavender);
            opacity: 0.6;
        }
        .music-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 0.9rem;
            color: var(--lavender);
        }

        #musicToggle {
            width: 56px; height: 28px;
            background: #0a0715;
            border: 3px solid #5b3f8e;
            position: relative;
            cursor: pointer;
            flex-shrink: 0;
        }
        #musicToggle::after {
            content: '';
            position: absolute;
            top: 3px; left: 3px;
            width: 16px; height: 16px;
            background: #5b3f8e;
            transition: all 0.2s;
        }
        #musicToggle.active::after { transform: translateX(28px); background: var(--lavender); }

        input[type="range"] { width: 100%; accent-color: var(--lavender); }

        .sessions-panel { background: var(--surface2); border: 2px solid #2e2250; padding: 14px; }

        .session-dots { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }

        .session-dot {
            width: 18px; height: 18px;
            border: 2px solid #3b2d5e;
            background: #0a0715;
            position: relative;
        }
        .session-dot.done {
            background: var(--blush);
            border-color: var(--blush);
            box-shadow: 0 0 6px #f9a8d488;
        }
        .session-dot.done::after {
            content: '✿';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%,-50%);
            font-size: 0.55rem;
            color: var(--bg);
        }

        .hints-panel {
            background: var(--surface2);
            border: 2px solid #2e2250;
            padding: 14px;
            font-size: 0.75rem;
            color: #6b5a8a;
            line-height: 1.9;
        }
        .hints-panel .hint-title { color: #9d7ec9; margin-bottom: 4px; }
 
        /* ── COMPLETION OVERLAY ── */
        .completion-overlay {
            position: fixed;
            inset: 0;
            background: rgba(13, 7, 20, 0.96);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
            flex-direction: column;
            gap: 24px;
            text-align: center;
            padding: 30px;
        }
        .completion-overlay.show { display: flex; }
        .completion-title {
            font-family: 'Press Start 2P', cursive;
            font-size: 2rem;
            color: var(--mint);
            text-shadow: 0 0 20px #6ee7b7, 0 0 40px #6ee7b788;
            animation: pulse 1.2s ease-in-out infinite;
        }
        .completion-sub {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.85rem;
            color: var(--lavender);
            line-height: 2.2;
        }
        .completion-stars {
            font-size: 1.8rem;
            letter-spacing: 8px;
            animation: bob 1.5s ease-in-out infinite;
        }
        .completion-btn {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.85rem;
            padding: 14px 28px;
            background: transparent;
            color: var(--mint);
            border: 3px solid var(--mint);
            cursor: pointer;
            box-shadow: 0 0 0 3px #0d0a14;
            margin-top: 8px;
        }
        .completion-btn:hover { background: var(--mint); color: var(--bg); }
        @keyframes pulse {
            0%,100% { text-shadow: 0 0 20px #6ee7b7, 0 0 40px #6ee7b788; }
            50%      { text-shadow: 0 0 30px #6ee7b7, 0 0 70px #6ee7b7cc; }
        }

        .notification {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%,-50%);
            background: rgba(13,7,20,0.97);
            border: 5px solid var(--lavender);
            padding: 28px 48px;
            font-family: 'Press Start 2P', cursive;
            font-size: 1.5rem;
            color: var(--lavender);
            text-shadow: 0 0 16px #c084fc88;
            display: none;
            z-index: 100;
            animation: pop 0.4s;
            box-shadow: 0 0 40px rgba(192,132,252,0.35);
        }
        @keyframes pop {
            0%   { transform: translate(-50%,-50%) scale(0.6); opacity:0; }
            100% { transform: translate(-50%,-50%) scale(1);   opacity:1; }
        }

        @media (max-width: 700px) {
            body { padding: 12px; }
            .crt-frame { border-width: 10px; }
            .crt-screen { padding: 18px 16px; }
            .layout { grid-template-columns: 1fr; }
            .col-left, .col-right, .header-full, .footer-full { grid-column: 1; }
            .col-right { margin-top: 16px; }
            .title { font-size: 1.2rem; letter-spacing: 2px; }
            #timer { font-size: 4rem; }
            #mode  { font-size: 0.7rem; }
            .notification { font-size: 1rem; padding: 18px 24px; }
        }
        @media (max-width: 400px) {
            body { padding: 6px; }
            .crt-frame { border-width: 6px; }
            .crt-screen { padding: 12px 10px; }
            .title { font-size: 0.95rem; }
            #timer { font-size: 3.2rem; letter-spacing: 4px; }
            #mode  { font-size: 0.6rem; }
            button { font-size: 0.65rem; padding: 10px 12px; }
            input[type="number"] { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <!-- page-level starfield -->
    <div id="page-stars"></div>

    <div class="crt-frame">
        <div class="crt-screen">
            <div class="stars" id="inner-stars"></div>
            <div class="layout">
                <div class="header-full">
                    <div class="title">
                        <span class="tomato-icon">✿</span>RETRO POMO<span class="tomato-icon">✿</span>
                    </div>
                    <div class="subtitle">WORK SESSION · DOING THE THING</div>
                </div>

                <div class="col-left">
                    <div class="display">
                        <div id="timer">25:00</div>
                        <div id="mode">· FOCUS SESSION ·</div>
                    </div>
                    <div class="controls">
                        <button id="startBtn">START</button>
                        <button id="pauseBtn" style="display:none;">PAUSE</button>
                        <button id="resetBtn">RESET</button>
                    </div>
                    <div class="settings">
                        <div class="control-group">
                            <label>FOCUS (H:MM)</label>
                            <input type="text" id="focusInput" value="0:25" maxlength="5" placeholder="0:25" style="width:100%;background:#0a0715;border:2px solid #3b2d5e;color:var(--cream);font-family:'VT323',monospace;font-size:1.6rem;padding:8px;text-align:center;">
                        </div>
                        <div class="control-group">
                            <label>BREAK (H:MM)</label>
                            <input type="text" id="breakInput" value="0:05" maxlength="5" placeholder="0:05" style="width:100%;background:#0a0715;border:2px solid #3b2d5e;color:var(--cream);font-family:'VT323',monospace;font-size:1.6rem;padding:8px;text-align:center;">
                        </div>
                    </div>
                </div>

                <div class="col-right">
                    <div class="music-panel">
                        <div class="music-header">
                            <span>◉ BACKGROUND SYNTH</span>
                            <div id="musicToggle"></div>
                        </div>
                        <input type="range" id="volumeSlider" min="0" max="100" value="60">
                        <div style="font-size:0.7rem;text-align:center;margin-top:4px;color:#6b5a8a;">VOLUME</div>
                    </div>

                    <div class="sessions-panel">
                        <div style="display:flex;justify-content:space-between;align-items:center;">
                            <div style="font-size:0.8rem;color:#9d7ec9;">SESSIONS</div>
                            <div style="display:flex;align-items:center;gap:6px;">
                                <span style="font-size:0.7rem;color:#6b5a8a;">GOAL</span>
                                <input type="number" id="sessionGoalInput" value="4" min="1" max="10"
                                    style="width:48px;background:#0a0715;border:2px solid #3b2d5e;color:var(--cream);font-family:'VT323',monospace;font-size:1.2rem;padding:4px 6px;text-align:center;">
                            </div>
                        </div>
                        <div class="session-dots" id="sessionDots"></div>
                        <div style="font-size:0.7rem;color:#6b5a8a;margin-top:8px;" id="sessionCount">0 / 4 POMODOROS</div>
                    </div>

                    <div class="hints-panel">
                        <div class="hint-title">KEYBOARD</div>
                        <div>SPACE / K — play/pause</div>
                        <div>R — reset</div>
                        <div>M — toggle music</div>
                    </div>
                </div>

                <div class="footer-full">✦ press start · take breaks · rewind time ✦</div>
            </div>
        </div>
    </div>

    <!-- Completion overlay -->
    <div class="completion-overlay" id="completionOverlay">
        <div class="completion-stars">✿ ✦ ✿</div>
        <div class="completion-title">ALL DONE!</div>
        <div class="completion-sub">
            YOU CRUSHED ALL<br>
            <span id="completionCount" style="color:var(--blush);">4</span> SESSIONS!<br><br>
            GREAT WORK TODAY ✦
        </div>
        <button class="completion-btn" id="completionResetBtn">NEW SESSION</button>
    </div>
 
    <div id="notification" class="notification"></div>

    <script>
        /* ── PAGE STARFIELD ── */
        (function() {
            const container = document.getElementById('page-stars');
            const colors = ['#c084fc','#f9a8d4','#7dd3fc','#6ee7b7','#fef9c3','#ffffff'];
            const count = 120;
            for (let i = 0; i < count; i++) {
                const s = document.createElement('div');
                s.className = 'pstar';
                const size = Math.random() < 0.7 ? 1 : (Math.random() < 0.6 ? 2 : 3);
                const color = colors[Math.floor(Math.random() * colors.length)];
                const dur   = (2.5 + Math.random() * 4).toFixed(2) + 's';
                const delay = (Math.random() * -6).toFixed(2) + 's';
                const dim   = (0.06 + Math.random() * 0.1).toFixed(2);
                const bright= (0.25 + Math.random() * 0.35).toFixed(2);
                s.style.cssText = `
                    width:${size}px; height:${size}px;
                    background:${color};
                    left:${(Math.random()*100).toFixed(2)}%;
                    top:${(Math.random()*100).toFixed(2)}%;
                    --dur:${dur}; --delay:${delay};
                    --dim:${dim}; --bright:${bright};
                `;
                container.appendChild(s);
            }
        })();

        /* ── INNER CRT STARS ── */
        (function() {
            const container = document.getElementById('inner-stars');
            const colors = ['#c084fc','#f9a8d4','#7dd3fc','#6ee7b7'];
            for (let i = 0; i < 24; i++) {
                const s = document.createElement('div');
                s.className = 'star';
                s.style.width = s.style.height = '3px';
                s.style.left = Math.random() * 100 + '%';
                s.style.top  = Math.random() * 100 + '%';
                s.style.background = colors[Math.floor(Math.random() * colors.length)];
                s.style.animationDelay    = (Math.random() * 3) + 's';
                s.style.animationDuration = (2 + Math.random() * 3) + 's';
                container.appendChild(s);
            }
        })();

        /* ── APP ── */
        const timerEl      = document.getElementById('timer');
        const modeEl       = document.getElementById('mode');
        const startBtn     = document.getElementById('startBtn');
        const pauseBtn     = document.getElementById('pauseBtn');
        const resetBtn     = document.getElementById('resetBtn');
        const focusInput   = document.getElementById('focusInput');
        const breakInput   = document.getElementById('breakInput');
        const musicToggle  = document.getElementById('musicToggle');
        const volumeSlider = document.getElementById('volumeSlider');
        const notification = document.getElementById('notification');
        const sessionDots  = document.getElementById('sessionDots');
        const sessionCount = document.getElementById('sessionCount');

        let focusTime = 25 * 60, breakTime = 5 * 60;
        let timeLeft = focusTime;
        let isRunning = false, isFocusMode = true;
        let timerInterval = null;
        let audioContext = null;
        let isMusicPlaying = false;
        let musicNodes = null;
        let masterGain = null;
        let completedSessions = 0;
        let totalSessions = 4;

        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                masterGain = audioContext.createGain();
                masterGain.gain.value = volumeSlider.value / 100 * 0.35;
                masterGain.connect(audioContext.destination);
            }
        }

        const ARP_NOTES  = [130.81,155.56,174.61,196.00,233.08,261.63,311.13,349.23];
        const BASS_NOTES = [65.41,77.78,87.31,98.00];

        function startSynth() {
            initAudio();
            if (musicNodes) return;
            const now = audioContext.currentTime;
            musicNodes = [];
            [130.81,155.56,196.00,233.08].forEach(freq => {
                const osc = audioContext.createOscillator();
                const g = audioContext.createGain();
                const f = audioContext.createBiquadFilter();
                osc.type = 'sawtooth'; osc.frequency.value = freq;
                f.type = 'lowpass'; f.frequency.value = 600; f.Q.value = 1.5;
                g.gain.value = 0.04;
                osc.connect(f).connect(g).connect(masterGain);
                osc.start(now);
                musicNodes.push(osc, g, f);
            });
            let bs = 0;
            const bOsc = audioContext.createOscillator();
            const bGain = audioContext.createGain();
            bOsc.type = 'square'; bOsc.frequency.value = BASS_NOTES[0]; bGain.gain.value = 0;
            bOsc.connect(bGain).connect(masterGain); bOsc.start(now);
            musicNodes.push(bOsc, bGain);
            const bInt = setInterval(() => {
                if (!audioContext) return;
                const t = audioContext.currentTime;
                bOsc.frequency.setValueAtTime(BASS_NOTES[bs % BASS_NOTES.length], t);
                bGain.gain.cancelScheduledValues(t);
                bGain.gain.setValueAtTime(0.07, t);
                bGain.gain.exponentialRampToValueAtTime(0.001, t + 0.38);
                bs++;
            }, 500);
            musicNodes.push({ stop: () => clearInterval(bInt) });
            let as = 0;
            const aOsc = audioContext.createOscillator();
            const aGain = audioContext.createGain();
            const aFilt = audioContext.createBiquadFilter();
            aOsc.type = 'square'; aOsc.frequency.value = ARP_NOTES[0];
            aFilt.type = 'bandpass'; aFilt.frequency.value = 1200; aFilt.Q.value = 3;
            aGain.gain.value = 0;
            aOsc.connect(aFilt).connect(aGain).connect(masterGain); aOsc.start(now);
            musicNodes.push(aOsc, aGain, aFilt);
            const aPat = [0,2,4,5,4,2,0,3];
            const aInt = setInterval(() => {
                if (!audioContext) return;
                const t = audioContext.currentTime;
                aOsc.frequency.setValueAtTime(ARP_NOTES[aPat[as % aPat.length]], t);
                aGain.gain.cancelScheduledValues(t);
                aGain.gain.setValueAtTime(0.06, t);
                aGain.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
                as++;
            }, 250);
            musicNodes.push({ stop: () => clearInterval(aInt) });
            let hs = 0;
            const hInt = setInterval(() => {
                if (!audioContext || hs % 2 !== 0) { hs++; return; }
                const buf = audioContext.createBuffer(1, audioContext.sampleRate * 0.05, audioContext.sampleRate);
                const d = buf.getChannelData(0);
                for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1)*0.15;
                const src = audioContext.createBufferSource();
                const hg = audioContext.createGain();
                const hf = audioContext.createBiquadFilter();
                hf.type = 'highpass'; hf.frequency.value = 8000;
                src.buffer = buf; hg.gain.value = 0.3;
                src.connect(hf).connect(hg).connect(masterGain); src.start();
                hs++;
            }, 125);
            musicNodes.push({ stop: () => clearInterval(hInt) });
        }

        function stopSynth() {
            if (!musicNodes) return;
            musicNodes.forEach(n => { try { if(n.stop) n.stop(); if(n.disconnect) n.disconnect(); } catch(e){} });
            musicNodes = null;
        }

        function toggleMusic() {
            isMusicPlaying = !isMusicPlaying;
            musicToggle.classList.toggle('active', isMusicPlaying);
            if (isMusicPlaying) startSynth(); else stopSynth();
        }

        function updateVolume() {
            if (masterGain) masterGain.gain.value = volumeSlider.value / 100 * 0.35;
        }

        function playRetroBeep() {
            initAudio();
            const now = audioContext.currentTime;
            const osc = audioContext.createOscillator();
            const g   = audioContext.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(420, now);
            g.gain.setValueAtTime(0.3, now);
            g.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
            osc.connect(g).connect(audioContext.destination);
            osc.start(now); osc.stop(now + 0.9);
            setTimeout(() => {
                const o2 = audioContext.createOscillator();
                const g2 = audioContext.createGain();
                o2.type = 'square';
                o2.frequency.setValueAtTime(560, audioContext.currentTime);
                g2.gain.setValueAtTime(0.2, audioContext.currentTime);
                g2.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.6);
                o2.connect(g2).connect(audioContext.destination);
                o2.start(); o2.stop(audioContext.currentTime + 0.7);
            }, 180);
        }

        function parseHMM(val) {
            const parts = val.trim().split(':');
            if (parts.length === 2) {
                const h = parseInt(parts[0]) || 0;
                const m = parseInt(parts[1]) || 0;
                return (h * 3600) + (m * 60);
            }
            return (parseInt(val) || 25) * 60;
        }

        function formatTime(s) {
            const h   = Math.floor(s / 3600);
            const m   = Math.floor((s % 3600) / 60);
            const sec = s % 60;
            if (h > 0) {
                return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
            }
            return `${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
        }

        function updateDisplay() {
            timerEl.textContent = formatTime(timeLeft);
            if (isFocusMode) {
                modeEl.textContent = "· FOCUS SESSION ·";
                modeEl.style.color = "#f9a8d4";
                modeEl.style.textShadow = "0 0 10px #f9a8d488";
            } else {
                modeEl.textContent = "· BREAK TIME ·";
                modeEl.style.color = "#7dd3fc";
                modeEl.style.textShadow = "0 0 10px #7dd3fc88";
            }
        }

        function showCompletionOverlay() {
            clearInterval(timerInterval);
            isRunning = false;
            startBtn.style.display = 'inline-block';
            pauseBtn.style.display = 'none';
            document.getElementById('completionCount').textContent = totalSessions;
            document.getElementById('completionOverlay').classList.add('show');
            playRetroBeep();
            setTimeout(() => playRetroBeep(), 400);
            setTimeout(() => playRetroBeep(), 800);
        }

        function updateSessionDots() {
            const container = document.getElementById('sessionDots');
            container.innerHTML = '';
            for (let i = 0; i < totalSessions; i++) {
                const d = document.createElement('div');
                d.className = 'session-dot' + (i < completedSessions ? ' done' : '');
                container.appendChild(d);
            }
            sessionCount.textContent = `${completedSessions} / ${totalSessions} POMODOROS`;
            if (completedSessions >= totalSessions && totalSessions > 0) {
                setTimeout(() => showCompletionOverlay(), 400);
            }
        }

        function showNotification(text, color) {
            notification.textContent = text;
            notification.style.borderColor = color;
            notification.style.color = color;
            notification.style.display = 'block';
            setTimeout(() => { notification.style.display = 'none'; }, 2200);
        }

        function switchMode() {
            playRetroBeep();
            isFocusMode = !isFocusMode;
            if (isFocusMode) {
                timeLeft = focusTime;
                showNotification("✿ FOCUS TIME!", "#f9a8d4");
            } else {
                completedSessions++;
                updateSessionDots();
                // if completion overlay shown, don't start break
                if (completedSessions >= totalSessions) return;
                timeLeft = breakTime;
                showNotification("✦ BREAK TIME!", "#7dd3fc");
            }
            updateDisplay();
        }

        function tick() {
            if (timeLeft > 0) { timeLeft--; updateDisplay(); }
            else {
                clearInterval(timerInterval);
                isRunning = false;
                switchMode();
                setTimeout(() => { if (!isRunning) startTimer(); }, 1800);
            }
        }

        function startTimer() {
            if (isRunning) return;
            isRunning = true;
            startBtn.style.display = 'none';
            pauseBtn.style.display = 'inline-block';
            timerInterval = setInterval(tick, 1000);
        }

        function pauseTimer() {
            clearInterval(timerInterval);
            isRunning = false;
            startBtn.style.display = 'inline-block';
            pauseBtn.style.display = 'none';
        }

        function resetTimer() {
            clearInterval(timerInterval);
            isRunning = false;
            startBtn.style.display = 'inline-block';
            pauseBtn.style.display = 'none';
            timeLeft = isFocusMode ? focusTime : breakTime;
            updateDisplay();
        }

        function applySettings() {
            focusTime = parseHMM(focusInput.value) || 25 * 60;
            breakTime = parseHMM(breakInput.value) || 5  * 60;
            const g = parseInt(document.getElementById('sessionGoalInput').value) || 4;
            totalSessions = Math.min(Math.max(g, 1), 10);
            document.getElementById('sessionGoalInput').value = totalSessions;
            if (!isRunning) resetTimer();
            updateSessionDots();
        }

        function setupListeners() {
            startBtn.addEventListener('click', startTimer);
            pauseBtn.addEventListener('click', pauseTimer);
            resetBtn.addEventListener('click', resetTimer);
            focusInput.addEventListener('change', applySettings);
            breakInput.addEventListener('change', applySettings);
            document.getElementById('sessionGoalInput').addEventListener('change', applySettings);
            musicToggle.addEventListener('click', toggleMusic);
            volumeSlider.addEventListener('input', updateVolume);
            document.getElementById('completionResetBtn').addEventListener('click', () => {
                completedSessions = 0;
                isFocusMode = true;
                document.getElementById('completionOverlay').classList.remove('show');
                resetTimer();
                updateSessionDots();
            });
            document.addEventListener('keydown', e => {
                if (e.key===' '||e.key==='k'||e.key==='K') { e.preventDefault(); isRunning ? pauseTimer() : startTimer(); }
                if (e.key==='r'||e.key==='R') resetTimer();
                if (e.key==='m'||e.key==='M') toggleMusic();
            });
        }

        function init() {
            timeLeft = focusTime;
            updateDisplay();
            updateSessionDots();
            setupListeners();
            setTimeout(() => {
                timerEl.style.textShadow = '0 0 40px #fef9c3';
                setTimeout(() => updateDisplay(), 280);
            }, 800);
        }

        window.onload = init;
    </script>
</body>
</html>
